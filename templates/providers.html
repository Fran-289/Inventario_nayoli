{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Proveedores</h2>
        <div>
            <a href="{{ url_for('generate_pdf', module='providers') }}" class="btn btn-secondary">Descargar PDF</a>
            {% if session.role == 'admin' %}
            <button class="btn btn-primary" onclick="openModal('addModal')">Nuevo Proveedor</button>
            {% endif %}
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Contacto</th>
                    <th>Teléfono</th>
                </tr>
            </thead>
            <tbody>
                {% for p in providers %}
                <tr>
                    <td>{{ p.id }}</td>
                    <td>{{ p.name }}</td>
                    <td>{{ p.contact }}</td>
                    <td>{{ p.phone }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Modal -->
<div class="modal" id="addModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('addModal')">&times;</span>
        <h2>Nuevo Proveedor</h2>
        <form method="POST" action="{{ url_for('add_provider') }}">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Persona de Contacto</label>
                <input type="text" name="contact" class="form-control">
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" name="phone" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
