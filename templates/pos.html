{% extends "base.html" %}

{% block content %}
<div class="pos-layout">
    <!-- Panel Izquierdo: Productos -->
    <div class="card" style="display: flex; flex-direction: column; overflow: hidden; margin: 0;">
        <div class="card-header" style="margin-bottom: 0;">
            <input type="text" id="posSearch" placeholder="🔍 Escanea el código de barras o busca un producto y presiona Enter..." class="form-control" style="font-size: 1.2rem; padding: 1rem;" autofocus>
        </div>
        <div id="posResults" style="flex: 1; overflow-y: auto; padding: 1rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; align-content: start;">
            <!-- Resultados Ajax -->
        </div>
    </div>

    <!-- Panel Derecho: Carrito y Caja -->
    <div class="card" style="display: flex; flex-direction: column; margin: 0; background-color: var(--sidebar-bg);">
        <div class="card-header" style="padding-bottom: 0;">
            <h3>🛒 Venta Actual</h3>
        </div>
        <div id="cartItems" style="flex: 1; overflow-y: auto; padding: 1rem;">
            <!-- Elementos del Carrito -->
            <div id="emptyCartMsg" style="text-align: center; color: #94a3b8; margin-top: 2rem;">El carrito está vacío</div>
        </div>
        
        <div style="padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <form method="POST" action="{{ url_for('checkout') }}" id="checkoutForm">
                <input type="hidden" name="cart" id="cartInput">
                <div class="form-group">
                    <label>Cliente (Opcional)</label>
                    <select name="client_id" class="form-control">
                        <option value="">Público General</option>
                        {% for c in clients %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label>Efectivo Recibido</label>
                        <input type="number" step="0.01" name="cash_received" id="cashReceived" class="form-control" value="0">
                    </div>
                    <div style="flex: 1;">
                        <label>Método de Pago</label>
                        <select name="payment_method" id="paymentMethod" class="form-control" onchange="calculateChange()">
                            <option value="efectivo">Efectivo</option>
                            <option value="tarjeta">Tarjeta</option>
                            <option value="transferencia">Transferencia</option>
                            <option value="mixto">Mixto (Efectivo + Tarjeta)</option>
                        </select>
                    </div>
                </div>
                
                <div style="font-size: 1.5rem; font-weight: bold; text-align: right; margin: 1rem 0;">
                    Total: {{ global_settings.currency if global_settings else '$' }}<span id="cartTotal">0.00</span>
                </div>
                <div style="font-size: 1.2rem; text-align: right; color: var(--warning); margin-bottom: 0.5rem;" id="changeContainer">
                    Cambio: {{ global_settings.currency if global_settings else '$' }}<span id="cartChange">0.00</span>
                </div>
                <div id="paymentAlert" style="text-align: right; color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; display: none;">
                    Efectivo insuficiente. Faltan $<span id="missingAmount">0.00</span>.
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.2rem; padding: 1rem;" id="btnCheckout" disabled>
                    <i class="ph ph-shopping-cart"></i> Cobrar
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    let cart = [];
    
    const searchInput = document.getElementById('posSearch');
    const resultsDiv = document.getElementById('posResults');
    const cartItemsDiv = document.getElementById('cartItems');
    const emptyCartMsg = document.getElementById('emptyCartMsg');
    const cartTotalSpan = document.getElementById('cartTotal');
    const cartChangeSpan = document.getElementById('cartChange');
    const cashReceivedInput = document.getElementById('cashReceived');
    const paymentMethodSelect = document.getElementById('paymentMethod');
    const btnCheckout = document.getElementById('btnCheckout');
    const cartInput = document.getElementById('cartInput');
    
    // Búsqueda en vivo (Live Search) con Debounce
    let searchTimeout = null;
    
    searchInput.addEventListener('input', function(e) {
        clearTimeout(searchTimeout);
        const query = searchInput.value.trim();
        
        if(!query) {
            resultsDiv.innerHTML = '';
            return;
        }
        
        searchTimeout = setTimeout(() => {
            fetch(`/api/pos/search?q=${encodeURIComponent(query)}`)
                .then(r => r.json())
                .then(products => {
                    if(products.length === 1 && e.inputType === 'insertLineBreak') {
                        // Solo auto-agregar si presionaron Enter y hay 1 resultado
                        addToCart(products[0]);
                        searchInput.value = '';
                        resultsDiv.innerHTML = '';
                    } else if(products.length > 0) {
                        displayResults(products);
                    } else {
                        resultsDiv.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--danger);">No se encontró el producto o no hay stock.</div>';
                    }
                });
        }, 300); // 300ms delay
    });
    
    // Prevenir el submit por defecto del enter
    searchInput.addEventListener('keypress', function(e) {
        if(e.key === 'Enter') e.preventDefault();
    });

    function displayResults(products) {
        resultsDiv.innerHTML = products.map(p => `
            <div class="card" style="padding: 1rem; text-align: center; border: 1px solid var(--accent);">
                <div style="font-weight: bold; margin-bottom: 0.5rem;">${p.name}</div>
                <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 1rem;">Stock: ${p.stock}</div>
                <div style="display: flex; gap: 0.5rem; justify-content: center;">
                    <button class="btn btn-primary btn-sm" onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&#39;")}, false)'>
                        Unidad ($${p.price})
                    </button>
                    ${p.units_per_pack > 0 && p.pack_price > 0 && p.stock >= p.units_per_pack ? `
                    <button class="btn btn-secondary btn-sm" onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&#39;")}, true)'>
                        Fardo ($${p.pack_price})
                    </button>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }

    function addToCart(product, is_pack = false) {
        const cartId = product.id + (is_pack ? '_pack' : '_unit');
        const existing = cart.find(i => i.cartId === cartId);
        
        const requestedStock = is_pack ? product.units_per_pack : 1;
        const priceToUse = is_pack ? product.pack_price : product.price;
        const nameToUse = is_pack ? product.name + " (Fardo)" : product.name;

        if (existing) {
            const totalUnitsNeeded = (existing.qty + 1) * requestedStock;
            if(totalUnitsNeeded <= product.stock) {
                existing.qty++;
            } else {
                alert('Stock insuficiente.');
            }
        } else {
            if (requestedStock <= product.stock) {
                cart.push({...product, cartId: cartId, name: nameToUse, price: priceToUse, qty: 1, is_pack: is_pack});
            } else {
                alert('Stock insuficiente.');
            }
        }
        updateCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCart();
    }
    
    function changeQty(index, delta) {
        const item = cart[index];
        const stockNeeded = item.is_pack ? item.units_per_pack : 1;
        
        if(item.qty + delta > 0) {
            if ((item.qty + delta) * stockNeeded <= item.stock) {
                item.qty += delta;
            } else {
                alert('Stock insuficiente.');
            }
        } else if (item.qty + delta <= 0) {
            removeFromCart(index);
            return;
        }
        updateCart();
    }

    function setQty(index, value) {
        const item = cart[index];
        const newQty = parseInt(value);
        if (isNaN(newQty) || newQty <= 0) {
            removeFromCart(index);
            return;
        }
        
        const stockNeeded = item.is_pack ? item.units_per_pack : 1;
        if (newQty * stockNeeded <= item.stock) {
            item.qty = newQty;
        } else {
            alert('Stock insuficiente.');
        }
        updateCart();
    }

    function updateCart() {
        if(cart.length === 0) {
            cartItemsDiv.innerHTML = '<div id="emptyCartMsg" style="text-align: center; color: #94a3b8; margin-top: 2rem;">El carrito está vacío</div>';
            btnCheckout.disabled = true;
        } else {
            cartItemsDiv.innerHTML = cart.map((item, i) => {
                let subtotal = 0;
                let descText = "";
                if (!item.is_pack && item.units_per_pack > 0 && item.pack_price > 0) {
                    const packs = Math.floor(item.qty / item.units_per_pack);
                    const remainder = item.qty % item.units_per_pack;
                    subtotal = (packs * item.pack_price) + (remainder * item.price);
                    if (packs > 0) {
                        descText = `<div style="font-size: 0.75rem; color: var(--success);">¡Descuento mayoreo aplicado! (${packs} fardo${packs>1?'s':''})</div>`;
                    }
                } else {
                    subtotal = item.price * item.qty;
                }
                
                return `
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0.5rem 0;">
                    <div style="flex: 1;">
                        <div style="font-weight: bold; font-size: 0.9rem;">${item.name}</div>
                        <div style="color: var(--primary);">$${subtotal.toFixed(2)} (Cant: ${item.qty})</div>
                        ${descText}
                    </div>
                    <div style="display: flex; gap: 0.2rem; align-items: center;">
                        <button type="button" class="btn btn-secondary btn-sm" onclick="changeQty(${i}, -1)" style="padding: 0.2rem 0.5rem;">-</button>
                        <input type="number" value="${item.qty}" min="1" onchange="setQty(${i}, this.value)" class="form-control" style="width: 50px; text-align: center; padding: 0.2rem;">
                        <button type="button" class="btn btn-secondary btn-sm" onclick="changeQty(${i}, 1)" style="padding: 0.2rem 0.5rem;">+</button>
                        <i class="ph ph-trash" style="color: var(--danger); cursor: pointer; margin-left: 0.5rem; font-size: 1.2rem;" onclick="removeFromCart(${i})"></i>
                    </div>
                </div>
                `;
            }).join('');
            btnCheckout.disabled = false;
        }
        
        const total = cart.reduce((sum, item) => {
            if (!item.is_pack && item.units_per_pack > 0 && item.pack_price > 0) {
                return sum + (Math.floor(item.qty / item.units_per_pack) * item.pack_price) + ((item.qty % item.units_per_pack) * item.price);
            }
            return sum + (item.price * item.qty);
        }, 0);
        cartTotalSpan.textContent = total.toFixed(2);
        cartInput.value = JSON.stringify(cart);
        calculateChange();
    }
    
    cashReceivedInput.addEventListener('input', calculateChange);
    
    function calculateChange() {
        const total = cart.reduce((sum, item) => {
            if (!item.is_pack && item.units_per_pack > 0 && item.pack_price > 0) {
                return sum + (Math.floor(item.qty / item.units_per_pack) * item.pack_price) + ((item.qty % item.units_per_pack) * item.price);
            }
            return sum + (item.price * item.qty);
        }, 0);
        const cash = parseFloat(cashReceivedInput.value) || 0;
        const method = paymentMethodSelect.value;
        const change = cash - total;
        
        const changeContainer = document.getElementById('changeContainer');
        const paymentAlert = document.getElementById('paymentAlert');
        const missingAmount = document.getElementById('missingAmount');
        
        // Hide alerts by default
        paymentAlert.style.display = 'none';
        
        if (method === 'mixto') {
            const cardAmount = total - cash;
            if (cardAmount > 0) {
                changeContainer.innerHTML = `Por cobrar en Tarjeta: <span style="color: var(--primary);">$${cardAmount.toFixed(2)}</span>`;
            } else {
                changeContainer.innerHTML = `Cambio: $${change.toFixed(2)}`;
            }
        } else if (method === 'tarjeta' || method === 'transferencia') {
            changeContainer.innerHTML = `Cobro exacto: $${total.toFixed(2)}`;
            cashReceivedInput.value = '0';
        } else {
            changeContainer.innerHTML = `Cambio: $${change > 0 ? change.toFixed(2) : "0.00"}`;
            if (cash < total && cart.length > 0) {
                paymentAlert.style.display = 'block';
                missingAmount.textContent = Math.abs(change).toFixed(2);
            }
        }
        
        // Validation
        if (cart.length === 0) {
            btnCheckout.disabled = true;
        } else if (method === 'efectivo' && cash < total) {
            btnCheckout.disabled = true;
        } else {
            btnCheckout.disabled = false;
        }
    }

</script>
{% endblock %}
